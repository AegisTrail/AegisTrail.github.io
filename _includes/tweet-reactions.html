<style>
.giscus-frame {
  margin-top: 15px;
  background: #000;
  color: #eee;
  padding: 0px;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 24px rgba(0,0,0,0.45);
  transform: translateY(10px);
  opacity: 0;
  animation: slideFadeIn 600ms cubic-bezier(.2,.9,.2,1) forwards 150ms;
}
.giscus-frame::before{content:"";position:absolute;inset:-30%;background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.07) 0, transparent 32%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05) 0, transparent 28%),
radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04) 0, transparent 30%);
z-index:0;border-radius:8px;pointer-events:none;animation:giscusAurora 14s ease-in-out infinite}
.giscus-frame::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.2);z-index:1;border-radius:6px;pointer-events:none}
.giscus-frame .giscus{position:relative;z-index:2;padding:12px;transform:translateY(6px);opacity:0;animation:contentPop 500ms cubic-bezier(.2,.9,.2,1) forwards 350ms}
.giscus-frame iframe,.giscus-frame .giscus,.giscus-frame .giscus *{background:transparent !important;color:#e6eef8 !important;border-color:rgba(255,255,255,0.06) !important}
@keyframes slideFadeIn{to{transform:translateY(0);opacity:1}}
@keyframes contentPop{to{transform:translateY(0);opacity:1}}
@keyframes giscusAurora{
  0%{transform:translate3d(-3%, -2%, 0) scale(1);opacity:.7}
  33%{transform:translate3d(3%, 2%, 0) scale(1.08);opacity:1}
  66%{transform:translate3d(-2%, 3%, 0) scale(1.04);opacity:.85}
  100%{transform:translate3d(-3%, -2%, 0) scale(1);opacity:.7}
}
</style>

<section class="mt-5">
  <h2 class="h4 mb-3">Reactions</h2>
  <div class="giscus-frame" style="margin-top: 24px">
    <div class="giscus"></div>
  </div>
</section>

{% assign giscus_reactions_enabled = site.comments.giscus.reactions_enabled | default: 1 %}

<script src="https://giscus.app/client.js"
  data-repo="AegisTrail/AegisTrail.github.io"
  data-repo-id="R_kgDOPmTMzQ"
  data-category="General"
  data-category-id="DIC_kwDOPmTMzc4Cuu6_"
  data-mapping="pathname"
  data-strict="0"
  data-input-position="top"
  data-theme="transparent_dark"
  data-lang="{{ page.lang | default: site.lang }}"
  data-reactions-enabled="{{ giscus_reactions_enabled }}"
  crossorigin="anonymous"
  async>
</script>
